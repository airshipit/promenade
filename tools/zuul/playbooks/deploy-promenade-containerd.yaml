- hosts: primary
  vars:
    env:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      NO_PROXY: ""
      PROMENADE_TMP_LOCAL: "cache"
      DISTRO: "{{ distro }}"
  become: true
  tasks:
    - name: Generate configuration files
      shell: |
        set -xe;
        sysctl net.ipv4.conf.all.forwarding=1
        sysctl net.ipv4.conf.all.rp_filter=1
      args:
        chdir: /root
        executable: /bin/bash
      environment: "{{env}}"

    - name: Ensure pip
      include_role:
        name: ensure-pip

    - name: Clear firewall
      include_role:
        name: clear-firewall

    - name: Ensure docker
      include_role:
        name: ensure-docker

    - name: Install resolvconf
      command: apt-get install  resolvconf -y

    - name: Setup Apparmor
      shell: |
        set -xe;
        ./tools/deployment/apparmor/001-setup-apparmor-profiles.sh
      args:
        chdir: "{{ zuul.project.src_dir }}"
        executable: /bin/bash

    - name: List interfaces
      command: ip addr show

    - name: Generate certificates and build genesis script
      shell: |
        set -xe;
        ./tools/dev-build.sh generate-certs examples/containerd build replace {{ ansible_default_ipv4.interface }}
        ./tools/simple-deployment.sh build-all
      args:
        chdir: "{{ zuul.project.src_dir }}"
        executable: /bin/bash
      environment: "{{env}}"

    - name: Deploying genesis
      shell: |
        set -xe;
        ./build/genesis.sh
      args:
        chdir: "{{ zuul.project.src_dir }}"
        executable: /bin/bash

    - name: Validating genesis
      shell: |
        set -xe;
        ./build/validate-genesis.sh
      args:
        chdir: "{{ zuul.project.src_dir }}"
        executable: /bin/bash
      register: result
      retries: 3
      delay: 10
      until: result.rc == 0
