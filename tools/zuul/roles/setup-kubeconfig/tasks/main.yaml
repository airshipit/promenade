- name: Create .kube directory for zuul user
  file:
    path: ~zuul/.kube
    state: directory
    owner: zuul
    group: zuul
    mode: '0700'

- name: Copy admin kubeconfig
  copy:
    src: "{{ kubeconfig_path | default('/etc/kubernetes/admin/kubeconfig.yaml') }}"
    dest: ~zuul/.kube/config
    remote_src: true
    owner: zuul
    group: zuul
    mode: '0600'

- name: Copy admin PKI directory
  command: cp -r /etc/kubernetes/admin/pki ~zuul/.kube/pki

- name: Set ownership on PKI directory
  file:
    path: ~zuul/.kube/pki
    state: directory
    owner: zuul
    group: zuul
    mode: '0700'
    recurse: true

- name: Verify kubectl access
  command: kubectl get nodes
  become: false
  become_user: zuul
  changed_when: false
